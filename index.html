<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Einladung zu meinem Geburtstag!</title>
    
    <!-- Google Fonts für schöne Typografie -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- CSS-Styling für das anspruchsvolle Design -->
    <style>
        :root {
            --bg-color: #f8f6f2;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #607d8b;
            --accent-gold: #c5a880;
            --whatsapp-green: #25D366;
            --whatsapp-hover: #20ba5a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            text-align: center;
        }

        .hero-image {
            width: 100%;
            height: 250px;
            background-color: #e0dbd1;
            background-image: url('https://picsum.photos'); /* Hochwertiges Platzhalterbild (Sektgläser) */
            background-size: cover;
            background-position: center;
        }

        .content {
            padding: 40px 30px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .subtitle {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-gold);
            font-weight: 600;
            margin-bottom: 30px;
        }

        .details-box {
            background: #faf9f6;
            border: 1px solid #f0ede6;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 35px;
        }

        .detail-row {
            margin-bottom: 15px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
        }

        .detail-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        /* Stil für den WhatsApp Button */
        .whatsapp-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 24px;
            background-color: var(--whatsapp-green);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 211, 102, 0.2);
        }

        .whatsapp-btn:hover {
            background-color: var(--whatsapp-hover);
            transform: translateY(-2px);
        }

        .whatsapp-btn svg {
            margin-right: 10px;
            fill: currentColor;
            width: 20px;
            height: 20px;
        }

        /* Anpassung für das Kalender-Skript-Styling */
        add-to-calendar-button {
            --btn-background: #ffffff !important;
            --btn-text: #2c3e50 !important;
            --btn-border: #f0ede6 !important;
            --btn-shadow: 0 4px 12px rgba(0,0,0,0.02) !important;
            --btn-width: 100% !important;
        }
    </style>

    <!-- Skript für den professionellen Add-to-Calendar Button -->
    <script src="https://jsdelivr.net" async defer></script>
</head>
<body>

    <div class="container">
        <!-- Einladungsbild (Platzhalter) -->
        <div class="hero-image"></div>

        <div class="content">
            <h1>Let's Celebrate!</h1>
            <p class="subtitle">Einladung zum Geburtstag</p>

            <!-- Event-Details -->
            <div class="details-box">
                <div class="detail-row">
                    <p class="detail-label">Wann</p>
                    <p class="detail-value">Samstag, 12. September 2026 um 18:00 Uhr</p>
                </div>
                <div class="detail-row">
                    <p class="detail-label">Wo</p>
                    <p class="detail-value">Musterbar, Musterstraße 45, 12345 Musterstadt</p>
                </div>
            </div>

            <!-- Interaktions-Buttons -->
            <div class="button-group">
                
                <!-- WhatsApp Zusagen Button -->
                <!-- Erklärung wa.me Link: Telefonnummer 00491723555355, Text "Ja ich komme gern zu deinem Geburtstag." vollständig URL-codiert -->
                <a href="https://whatsapp.com/491735272984" target="_blank" class="whatsapp-btn">
                    <!-- WhatsApp Icon -->
                    <svg viewBox="0 0 24 24">
                        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.713-1.457L0 24zm6.59-4.846c1.66.986 3.288 1.479 5.357 1.48 5.337 0 9.683-4.335 9.686-9.664.002-2.583-1.002-5.01-2.826-6.834C17.044 2.311 14.622 1.31 12.01 1.31c-5.34 0-9.686 4.337-9.688 9.667-.001 1.954.512 3.562 1.483 5.188L2.744 21.053l4.903-1.286zM17.51 14.54c-.26-.13-1.541-.76-1.78-.847-.23-.08-.4-.13-.57.13-.17.26-.65.82-.8 1-.15.17-.3.19-.56.06-.26-.13-1.1-.4-2.1-1.3-.77-.69-1.29-1.54-1.44-1.8-.15-.26-.02-.4.11-.53.12-.12.26-.3.4-.45.13-.15.17-.26.26-.43.09-.17.04-.32-.02-.45-.06-.13-.57-1.37-.78-1.88-.2-.5-.4-.43-.57-.44-.15-.01-.32-.01-.5-.01-.17 0-.45.06-.69.32-.24.26-.92.9-1-.17-.18-1.55-1.14-2.22-1.25-1.54-1.37.58-.24 1.34-.33 2.1-.28 3.03 2.45 5.84 5.32 6.13 2.37.24 4.5.17 6.19-.08.38-.06 1.14-.47 1.3-1.02.16-.54.16-1 .11-1.1-.04-.1-.17-.16-.43-.28z"/>
                    </svg>
                    Ja, ich komme gern!
                </a>

                <!-- Kalendereintrag Button -->
                <add-to-calendar-button
                    name="Geburtstagsfeier!"
                    options="'Apple','Google','Outlook.com','iCal'"
                    location="Musterbar, Musterstraße 45, 12345 Musterstadt"
                    startDate="2026-09-12"
                    startTime="18:00"
                    endTime="23:59"
                    timeZone="Europe/Berlin"
                    buttonStyle="round"
                    language="de"
                    hideTextLabelButton
                    label="Termin in Kalender speichern">
                </add-to-calendar-button>

            </div>
        </div>
    </div>

</body>
</html>
